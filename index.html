<style>

  :root{--bg:#fff;--ink:#1d1d1f;--ink-soft:#424245;--ink-light:#86868b;--divider:#d2d2d7;--accent-red:#c8102e;--accent-blue:#0066cc;--accent-amber:#d97706;--accent-green:#00855b;--card-bg:#fafafa;--nav-bg:rgba(255,255,255,.85)}

  html{-webkit-text-size-adjust:100%}

  .brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:-.5px}
  .date-picker{display:flex;align-items:center;gap:8px}
  .date-picker button{background:none;border:none;color:var(--ink-light);font-size:20px;cursor:pointer;padding:0 2px;line-height:1}
  .date-picker button:hover{color:var(--accent-blue)}
  .date-picker button:disabled{opacity:.25;cursor:default}
  .date-display{position:relative;font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;cursor:pointer;padding:5px 10px;border-radius:8px;background:var(--card-bg);display:flex;align-items:center;gap:6px}
  .date-display:hover{color:var(--accent-blue)}
  .date-display input[type="date"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .date-display .cal-icon{font-size:12px}
  .tabs{position:sticky;top:47px;z-index:99;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--divider)}
  .tabs-inner{max-width:720px;margin:0 auto;padding:0 12px;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs-inner::-webkit-scrollbar{display:none}
  .tab{flex:1 0 auto;min-width:72px;text-align:center;padding:13px 14px;font-size:14px;font-weight:600;color:var(--ink-light);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;background:none;font-family:inherit}
  .tab.active{color:var(--ink)}
  .tab[data-cat="us_stocks"].active{border-bottom-color:var(--accent-red)}
  .tab[data-cat="my_stocks"].active{border-bottom-color:var(--accent-amber)}
  .tab[data-cat="ai"].active{border-bottom-color:var(--accent-blue)}
  .tab[data-cat="macro"].active{border-bottom-color:var(--accent-green)}

  .tab.active .count{background:var(--ink);color:var(--bg)}

  .masthead-sub{font-size:12px;color:var(--ink-light);margin-top:8px;text-transform:uppercase;letter-spacing:1.2px}

  .story-source{margin-top:18px;padding-top:13px;border-top:1px dotted var(--divider);font-size:12px;color:var(--ink-light);display:flex;justify-content:space-between;align-items:center}
  .source-pill{display:inline-flex;align-items:center;padding:4px 12px;background:var(--card-bg);border-radius:12px;font-weight:500;color:var(--ink-soft);text-decoration:none;min-height:30px}
  .empty{padding:60px 20px;text-align:center;color:var(--ink-light);font-size:14px}
  .doc-footer{margin:48px 0 60px;padding-top:28px;border-top:2px solid var(--ink);text-align:center;font-size:11px;color:var(--ink-light);letter-spacing:1.5px;text-transform:uppercase}
  .nav-hint{font-size:11px;color:var(--ink-light);text-align:center;padding:8px 0;display:none}
  .no-data-hint{padding:40px;text-align:center;color:var(--ink-light);font-size:14px;border:1px dashed var(--divider);border-radius:8px;margin:20px 0}
  @media(max-width:640px){

    .story-headline{font-size:23px}.story.lead .story-headline{font-size:27px}
    .story-hero{height:170px}

</style>
</head>

ut a new Wall Street crypto hype is on the rise", "data_card": null, "body": ["比特币价格暴跌至2024年以来最低，但新HYPE ETF成为热点[CNBC @ 09:00 MYT]。", "HYPE股价数据未验证[CNBC @ 09:00 MYT]。", "投资者需谨慎对待加密货币波动风险[CNBC @ 09:00 MYT]。"], "source_url": "", "source_name": "CNBC", "timestamp": "2026-06-07 09:00:00 MYT", "_warnings": []}], "my_stocks": [], "ai": [{"tag": "0", "headline": "隐蔽LLM代理的说服策略研究", "dek": "分析Reddit上已停止的现场实验数据集，研究隐蔽LLM代理的说服策略。", "data_card": null, "body": ["该研究分析了一个公开数据集，该数据集来自Reddit的r/ChangeMyView板块上已停止的现场实验。实验由未知方进行，旨在测试LLM代理的说服能力。", "研究重点在于揭示这些隐蔽代理所使用的说服策略，包括情感诉求、逻辑论证和社会认同等技巧。通过分析对话记录，研究者试图量化代理对用户观点改变的影响。", "结论指出，尽管实验已停止，但数据集仍为理解LLM在真实社交互动中的说服行为提供了宝贵视角，并警示了潜在滥用风险。"], "source_url": "https://arxiv.org/abs/2606.05256", "source_name": "Arxiv ML", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "1", "headline": "LLM法官的稳定性与可操纵性评估", "dek": "研究LLM作为评判者在后决策交互下的鲁棒性。", "body": ["LLM-as-judge评估在基准测试中广泛使用，通过自动评估器对模型输出进行比较和排名。然而，这些评估器在面临后决策交互时可能不够稳定。", "本研究提出一种评估框架，测试LLM法官在用户反馈或对抗性输入后的判断变化。实验表明，某些LLM法官容易受到操纵，导致排名结果不一致。", "作者建议在评估流程中加入稳定性检查，并设计更鲁棒的评判机制，以减少可操纵性对基准测试结果的影响。"], "source_url": "https://arxiv.org/abs/2606.05384", "source_name": "Arxiv ML", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "2", "headline": "OpenAI推出锁定模式防提示注入", "dek": "新锁定模式旨在减少敏感数据泄露风险，但仍可能受提示注入攻击。", "body": ["OpenAI宣布推出Lockdown Mode，旨在保护ChatGPT中的敏感数据免受提示注入攻击。该模式通过限制模型对某些指令的响应来降低数据泄露概率。", "尽管Lockdown Mode增加了安全层，但研究人员指出它并不能完全防御所有提示注入攻击。攻击者仍可能通过巧妙构造的输入绕过防护。", "OpenAI表示将继续改进该功能，并鼓励用户结合其他安全措施使用。该模式目前已在企业版中可用。"], "source_url": "https://techcrunch.com/2026/06/07/openai-lockdown-mode/", "source_name": "TechCrunch AI", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "3", "headline": "智能体间动作状态通信研究", "dek": "提出动作状态通信方法以提高多智能体系统效率。", "body": ["基于大语言模型的多智能体系统通常围绕角色、流水线和轮次调度组织，但智能体间通信内容往往缺乏效率。本研究提出动作状态通信范式。", "该方法让智能体不仅传递动作指令，还共享当前状态信息，从而减少冗余通信和误解。实验表明，在协作任务中，动作状态通信显著提升了任务完成速度和准确性。", "作者认为，这种通信方式更接近人类团队协作模式，为构建更高效的多智能体系统提供了新思路。"], "source_url": "https://arxiv.org/abs/2606.05304", "source_name": "Arxiv ML", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "4", "headline": "长期运行监控智能体基准SentinelBench", "dek": "针对长时间运行AI智能体的新基准测试。", "body": ["AI智能体越来越多地被要求执行持续数分钟、数小时甚至更长时间的任务。然而，默认的智能体行为模型是连续动作，缺乏对长期运行的专门评估。", "SentinelBench是一个新基准，专门用于测试长时间运行的监控智能体。它包含多种场景，如系统监控、异常检测和持续决策，评估智能体的持久性和可靠性。", "初步实验显示，现有智能体在长时间运行中容易出现性能下降和错误累积，SentinelBench为改进此类系统提供了标准化测试平台。"], "source_url": "https://arxiv.org/abs/2606.05342", "source_name": "Arxiv ML", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "5", "headline": "特朗普政府或入股OpenAI", "dek": "特朗普表示正在讨论让美国人民从AI成功中受益的交易。", "body": ["美国总统特朗普表示，他正在讨论一项交易，其中美国人民可以通过AI的成功受益。这可能涉及政府持有OpenAI的股权。", "特朗普没有透露具体条款，但强调交易将确保AI发展的成果惠及公众。此举可能引发关于政府干预私营科技公司的辩论。", "OpenAI尚未正式回应。分析人士认为，如果交易达成，将改变AI行业的竞争格局，并可能影响其他AI公司的融资策略。"], "source_url": "https://techcrunch.com/2026/06/07/trump-openai-equity/", "source_name": "TechCrunch AI", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "6", "headline": "GITCO：时间序列基础模型的门控推理优化", "dek": "提出门控推理时间上下文优化方法解决TSFM的上下文中毒问题。", "body": ["基于补丁的时间序列基础模型（TSFM）面临上下文中毒问题：结构异常的补丁会捕获不成比例的注意力，导致预测偏差。", "GITCO（门控推理时间上下文优化）通过引入门控机制，在推理时动态调整上下文权重，抑制异常补丁的影响。该方法无需重新训练模型。", "实验表明，GITCO在多个时间序列基准上显著提升了预测准确性，尤其对含有异常值的序列效果明显。"], "source_url": "https://arxiv.org/abs/2606.05332", "source_name": "Arxiv ML", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "7", "headline": "micropython-wasm 0.1a2发布", "dek": "新版本增加了命令行界面。", "body": ["micropython-wasm 0.1a2版本发布，主要新增了命令行界面（CLI）。该工具允许用户在WebAssembly环境中运行MicroPython。", "CLI的加入使得开发者可以更方便地测试和部署MicroPython脚本，无需依赖浏览器。该版本还修复了若干内存管理问题。", "项目托管在GitHub上，采用MIT许可证。开发者可以下载并尝试在沙箱环境中运行Python代码。"], "source_url": "https://github.com/simonw/micropython-wasm/releases/tag/0.1a2", "source_name": "Simon Willison", "timestamp": "2026-06-07T00:00:00Z", "_warnings": []}, {"tag": "8", "headline": "使用MicroPython和WASM沙箱运行Python", "dek": "作者探索了多种沙箱方案，最新尝试似乎具备所有理想特性。", "body": ["作者多年来一直在尝试不同的代码沙箱方案，最新尝试使用MicroPython和WebAssembly（WASM）组合。这种方法似乎终于具备了所有理想特性。", "Mi 88.33美元。[yfinance @ 09:00 MYT]", "公司计划推出更多创新产品，包括24小时交易和养老金账户。管理层对用户增长和交易量持乐观态度，预计下半年收入将加速增长。[Seeking Alpha @ 09:00 MYT]", "投资者关注Robinhood能否持续扩大市场份额并实现盈利。会议透露公司将增加人工智能投资以提升用户体验，但尚未公布具体财务目标。[Seeking Alpha @ 09:00 MYT]"], "source_url": "https://seekingalpha.com/article/example-robinhood", "source_name": "Seeking Alpha", "timestamp": "2026-06-05T09:00:00Z", "_warnings": []}, {"tag": "economic_data", "headline": "ISM服务业PMI持续扩张", "dek": "5月数据显示服务业稳健增长", "data_card": null, "body": ["美国5月ISM服务业采购经理人指数（PMI）录得54.0，高于荣枯线，表明服务业连续扩张。商业活动指数和新订单指数均保持强劲。[Seeking Alpha @ 09:00 MYT]", "分项数据显示就业指数小幅回升，但价格指数依然高企，显示通胀压力持续。服务业成本上升可能影响企业利润。[Seeking Alpha @ 09:00 MYT]", "尽管整体扩张，但增速较上月略有放缓。市场认为数据支持美联储维持高利率，降息预期推迟。服务业韧性是当前经济主要支撑。[Seeking Alpha @ 09:00 MYT]"], "source_url": "https://seekingalpha.com/article/example-ism-services", "source_name": "Seeking Alpha", "timestamp": "2026-06-05T09:00:00Z", "_warnings": []}, {"tag": "bond_market", "headline": "利率走势：关注非农数据", "dek": "债市等待就业报告指引", "data_card": null, "body": ["周五债市窄幅波动，投资者等待美国非农就业报告。近期收益率曲线趋陡，市场对经济软着陆的预期增强。[Seeking Alpha @ 09:00 MYT]", "如果非农数据强于预期，可能引发对美联储进一步加息的担忧，推高短端利率。反之，疲弱数据将强化降息预期，利好长期债券。[Seeking Alpha @ 09:00 MYT]", "欧洲债券市场也受美国数据影响，德国10年期收益率维持在2.5%附近。交易员认为，就业数据将成为本周最后交易日的关键催化剂。[Seeking Alpha @ 09:00 MYT]"], "source_url": "https://seekingalpha.com/article/example-rates-spark", "source_name": "Seeking Alpha", "timestamp": "2026-06-05T09:00:00Z", "_warnings": []}, {"tag": "currency", "headline": "美国就业数据或利好美元", "dek": "美元兑日元可能走强", "data_card": null, "body": ["StoneX分析师指出，今日公布的美国就业数据可能成为美元兑日元的看涨催化剂。强劲的就业报告将推动美元走强。[MarketWatch @ 09:00 MYT]", "美元兑日元目前交投于157.50附近，市场预期非农新增20万以上。日本央行虽结束负利率，但美日利差仍支持美元。[MarketWatch @ 09:00 MYT]", "若数据不及预期，美元可能回落至156以下。不过，StoneX认为整体趋势仍利于美元，因美国经济更具韧性。[MarketWatch @ 09:00 MYT]"], "source_url": "https://www.marketwatch.com/story/us-jobs-data-may-offer-bullish-catalyst-for-dollar-vs-yen", "source_name": "MarketWatch", "timestamp": "2026-06-05T09:00:00Z", "_warnings": []}, {"tag": "stock_downgrade", "headline": "lulu const DATES = ["2026-07-15", "2026-07-14", "2026-07-13", "2026-07-12", "2026-07-11", "2026-07-10", "2026-07-09", "2026-07-08", "2026-07-07", "2026-07-06", "2026-07-05", "2026-07-04", "2026-07-03", "2026-07-02", "2026-07-01", "2026-06-30", "2026-06-29", "2026-06-28", "2026-06-20", "2026-06-19", "2026-06-18", "2026-06-17", "2026-06-16", "2026-06-15", "2026-06-14", "2026-06-13", "2026-06-09", "2026-06-08", "2026-06-07", "2026-06-06", "2026-06-05", "2026-06-04", "2026-06-03", "2026-06-02", "2026-06-01", "2026-05-31", "2026-05-30", "2026-05-29"];
const CATS = [{"key": "us_stocks", "icon": "🇺🇸", "short": "美股", "title": "美股 · US Markets"}, {"key": "my_stocks", "icon": "🇲🇾", "short": "马股", "title": "马股 · Bursa Malaysia"}, {"key": "ai", "icon": "🤖", "short": "AI", "title": "AI · 人工智能"}, {"key": "macro", "icon": "🌐", "short": "宏观", "title": "宏观 · Macro"}];
const TODAY = "2026-07-15";
const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];

let curDate = DATES[0];

function fmt(d){
  const dt=new Date(d+'T00:00:00');
  return (dt.getMonth()+1)+'月'+dt.getDate()+'日 '+weekdays[dt.getDay()];
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// Build tabs
const tabsEl = document.getElementById('tabsContainer');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab'; btn.dataset.cat = cat.key;
  btn.innerHTML = cat.icon + ' ' + cat.short + '<span class="count">0</span>';
  btn.onclick = () => { switchTab(cat.key); window.scrollTo({top:0}); };
  tabsEl.appendChild(btn);
});

// Build panels
const panelsEl = document.getElementById('panelsContainer');
CATS.forEach(cat => {
  const div = document.createElement('div');
  div.className = 'panel'; div.dataset.cat = cat.key;
  div.innerHTML = `<div class="panel-head"><div class="panel-title">${cat.title}</div><div class="panel-count">0 stories</div></div><div class="stories-container"></div>`;
  panelsEl.appendChild(div);
});

function renderStories(catKey, stories){
  const panel = document.querySelector(`.panel[data-cat="${catKey}"]`);
  const container = panel.querySelector('.stories-container');
  panel.querySelector('.panel-count').textContent = stories.length + ' stories';
  if(!stories.length){
    const short = CATS.find(c=>c.key===catKey).short;
    container.innerHTML = `<div class="empty">暂无 ${short} 新闻</div>`;
    return;
  }
  container.innerHTML = stories.map((s,i) => {
    let h = `<article class="story ${i===0?'lead':''}">`;
    h += `<div class="story-meta"><span class="tag-${catKey}">${esc(s.tag)}</span><span class="dot">·</span><span>${esc(s.source_name)}</span></div>`;
    h += `<h2 class="story-headline">${esc(s.headline)}</h2>`;
    h += `<p class="story-dek">${esc(s.dek)}</p>`;
    if(s.hero_image_url) h += `<div class="story-hero"><img src="${esc(s.hero_image_url)}" alt="" loading="lazy"></div>`;
    if(s.data_card){
      h += `<div class="data-card ${catKey}"><div class="data-card-label">${esc(s.data_card.label||'DATA')}</div>`;
      (s.data_card.rows||[]).forEach(r=>{h+=`<div class="data-row"><span>${esc(r.label||r.ticker||'')}</span><span class="num ${r.color||''}">${esc(r.value||String(r.price||''))}</span></div>`;});
      h += `<div class="data-citation">${esc(s.data_card.citation||'')}</div></div>`;
    }
    if(s._warnings&&s._warnings.length) h += `<div class="story-warning">⚠️ ${s._warnings.map(esc).join(' · ')}</div>`;
    h += `<div class="story-body">${(s.body||[]).map(p=>'<p>'+esc(p)+'</p>').join('')}</div>`;
    h += `<div class="story-source"><a href="${esc(s.source_url)}" class="source-pill" target="_blank" rel="noopener">${esc(s.source_name||'')} →</a></div>`;
    h += `</article>`; return h;
  }).join('');
}

function renderDate(date){
  curDate = date;
  const data = ALL_DATA[date];
  document.getElementById('datePick').value = date;
  document.getElementById('dateText').textContent = fmt(date);
  document.getElementById('mastheadSub').textContent = date + ' · For Henry';
  document.getElementById('docFooter').textContent = 'Hermes Daily · ' + date;

  // Nav buttons: use DATES array for prev/next
  const idx = DATES.indexOf(date);
  document.getElementById('prevDay').disabled = (idx >= DATES.length - 1);
  document.getElementById('nextDay').disabled = (idx <= 0);

  if(!data){
    CATS.forEach(cat=>renderStories(cat.key,[]));
    document.querySelector('.stories-container').innerHTML = '<div class="no-data-hint">此日期无数据 · No data for this date</div>';
    return;
  }
  CATS.forEach(cat=>renderStories(cat.key, data[cat.key]||[]));
  document.querySelectorAll('.tab').forEach(t=>{
    const key=t.dataset.cat; t.querySelector('.count').textContent=(data[key]||[]).length;
  });
  const first = CATS.find(c=>(data[c.key]||[]).length>0);
  switchTab(first?first.key:CATS[0].key);
}

function switchTab(key){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===key));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.cat===key));
}

// Date navigation via DATES array
document.getElementById('prevDay').onclick = () => {
  const idx = DATES.indexOf(curDate);
  if(idx < DATES.length - 1) renderDate(DATES[idx + 1]);
};
document.getElementById('nextDay').onclick = () => {
  const idx = DATES.indexOf(curDate);
  if(idx > 0) renderDate(DATES[idx - 1]);
};
document.getElementById('datePick').onchange = () => {
  const v = document.getElementById('datePick').value;
  if(ALL_DATA[v]) renderDate(v);
  else {
    // Find nearest available date
    const nearest = DATES.reduce((best,d) => Math.abs(new Date(d)-new Date(v)) < Math.abs(new Date(best)-new Date(v)) ? d : best, DATES[0]);
    renderDate(nearest);
  }
};

renderDate(curDate);
</script>
